services:
  - type: web
    name: simco-notification-backend
    runtime: docker
    dockerfilePath: services/notification_backend/Dockerfile
    dockerContext: services/notification_backend
    envVars:
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_STARTTLS
        value: true
      - key: MAIL_AUTH
        value: true
      - key: MAIL_FROM_NAME
        value: SIMCO Notifications
