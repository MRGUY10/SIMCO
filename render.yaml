services:
  - type: web
    name: simco-quiz-backend
    runtime: python
    rootDir: services/quiz_backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn -k uvicorn.workers.UvicornWorker services.quiz_backend.main:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: LLM_PROVIDER
        value: mistral_api
      - key: MISTRAL_API_BASE_URL
        value: https://api.mistral.ai/v1
      - key: MISTRAL_API_KEY
        value: AuTKCBPtPzXxR1RSJm4m6C3VnWwH9eaZ
      - key: MISTRAL_MODEL
        value: mistral-small-latest
      - key: MISTRAL_TIMEOUT
        value: 60
      - key: SIMCO_LOGIC_BASE_URL
        sync: false
      - key: NOTIFICATION_BASE_URL
        sync: false
      - key: NOTIFICATIONS_ENABLED
        value: false
      - key: NOTIFICATION_TIMEOUT_SECONDS
        value: 8
      - key: CORS_ORIGINS
        sync: false
      - key: DEBUG
        value: false
