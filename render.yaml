services:
  - type: web
    name: simco-quiz-backend
    runtime: python
    rootDir: services/quiz_backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn services.quiz_backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: mistral_api
      - key: MISTRAL_API_BASE_URL
        value: https://api.mistral.ai/v1
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_MODEL
        value: mistral-small-latest
      - key: MISTRAL_TIMEOUT
        value: 60
      - key: SIMCO_LOGIC_BASE_URL
        sync: false
      - key: NOTIFICATION_BASE_URL
        sync: false
      - key: NOTIFICATION_TIMEOUT_SECONDS
        value: 8
      - key: CORS_ORIGINS
        sync: false
      - key: DEBUG
        value: false
